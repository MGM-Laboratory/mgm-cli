name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Binaries, archives, checksums, Linux packages (deb/rpm/apk/Arch), and the
  # external-repo publishers (Homebrew cask, Scoop bucket, Nix NUR, AUR).
  #
  # The core release (archives + checksums + nfpm packages) always runs. Each
  # external publisher is skipped unless its token/secret is present, so a
  # release never fails just because a tap/bucket/AUR key hasn't been
  # provisioned yet. See docs/release.md for the required secrets.
  # ---------------------------------------------------------------------------
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute external-publisher skips
        id: skips
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
          NUR_GITHUB_TOKEN: ${{ secrets.NUR_GITHUB_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
        run: |
          set -euo pipefail
          skips=""
          add() { if [ -z "$skips" ]; then skips="$1"; else skips="$skips,$1"; fi; }
          [ -z "${HOMEBREW_TAP_GITHUB_TOKEN}" ] && add homebrew || true
          [ -z "${SCOOP_BUCKET_GITHUB_TOKEN}" ] && add scoop || true
          [ -z "${NUR_GITHUB_TOKEN}" ] && add nix || true
          [ -z "${AUR_KEY}" ] && add aur || true
          echo "value=${skips}" >> "$GITHUB_OUTPUT"
          # Nix NUR publishing needs nix-hash; gate the Nix install on its token.
          if [ -n "${NUR_GITHUB_TOKEN}" ]; then echo "nix=true" >> "$GITHUB_OUTPUT"; else echo "nix=false" >> "$GITHUB_OUTPUT"; fi
          echo "Skipping external publishers: '${skips:-<none>}'"

      # Nix NUR publishing needs `nix-hash`; install Nix only when a NUR token is
      # configured (otherwise the nix pipe auto-skips for lack of nix-hash).
      - name: Install Nix (for NUR)
        if: steps.skips.outputs.nix == 'true'
        uses: cachix/install-nix-action@v27

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> 2'
          args: release --clean ${{ steps.skips.outputs.value != '' && format('--skip={0}', steps.skips.outputs.value) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # External-repo publish targets (each optional; see docs/release.md).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
          NUR_GITHUB_TOKEN: ${{ secrets.NUR_GITHUB_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}

  # Docker images are handled by the dedicated CD workflows (production.yml /
  # staging.yml → labmgm/<repo>), not here.
