name: deploy-production

# Continuous deployment to Docker Hub. On every push to main, build the image
# and push labmgm/<repo-name> tagged :latest, :sha-<short>, and a build
# datetime. Image namespace + login come from the DOCKERHUB_USERNAME secret
# (labmgm); the access token is DOCKERHUB_TOKEN.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production-${{ github.repository }}
  cancel-in-progress: false

jobs:
  docker:
    name: build & push → :latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require Docker Hub credentials
        env:
          U: ${{ secrets.DOCKERHUB_USERNAME }}
          T: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$U" ] || [ -z "$T" ]; then
            echo "::error::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required to deploy."
            exit 1
          fi

      - name: Build datetime
        id: bd
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME || 'labmgm' }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=latest
            type=sha
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.bd.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
